plugins {
    id "org.springframework.boot" version "3.5.7"
    id "io.spring.dependency-management" version "1.1.7"
    id "java"
    id "eclipse"
}

group = 'no.domstol.otel'
version = '1.7.3'

configurations {
    compileClasspath {
        resolutionStrategy.activateDependencyLocking()
    }
    runtimeClasspath {
        resolutionStrategy.activateDependencyLocking()
    }
}

java {
    toolchain {
        languageVersion = JavaLanguageVersion.of(25)
    }
}

repositories {
    mavenCentral()
}

dependencies {
    implementation 'org.springframework.boot:spring-boot-starter-web'
    implementation 'org.springframework.boot:spring-boot-starter-actuator'
    implementation 'io.micrometer:micrometer-core:1.11.1'
    implementation 'io.micrometer:micrometer-registry-prometheus:1.11.1'
    implementation 'org.yaml:snakeyaml:2.2'
    developmentOnly 'org.springframework.boot:spring-boot-devtools'
    testImplementation 'org.springframework.boot:spring-boot-starter-test'

    testRuntimeOnly "org.junit.platform:junit-platform-launcher"
}

springBoot {
    mainClass = 'no.domstol.otel.agent.service.AgentConfigurationServiceApplication'
}

bootJar {
    enabled = true
    archiveFileName.set("service.jar")
}

jar {
    enabled = true
    archiveFileName.set("service-library.jar")
}
    
test {
    useJUnitPlatform()
}
