name: Continuous integration

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

permissions:
  contents: write

jobs:
  build-and-test:
    name: Build and test
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v6
    - name: Set up JDK 17
      uses: actions/setup-java@v5
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Set up Gradle
      uses: gradle/actions/setup-gradle@v5

    - name: Gradle build
      run: ./gradlew build --no-daemon -PGITHUB_TOKEN=${{ secrets.GITHUB_TOKEN }} -PGITHUB_USER=${{ github.actor }}

    - uses: actions/upload-artifact@v6
      with:
        name: da-opentelemetry-javaagent.jar
        path: extension/build/libs/da-opentelemetry-javaagent.jar
        if-no-files-found: error

    - uses: actions/upload-artifact@v6
      with:
        name: service.jar
        path: service/build/libs/service.jar
        if-no-files-found: error

    - uses: actions/upload-artifact@v6
      with:
        name: frontend.jar
        path: frontend/build/libs/frontend.jar
        if-no-files-found: error
